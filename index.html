<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roo '26 — Where Am I?</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; font-family:Arial,sans-serif; background:#141414; }
  #app { display:flex; flex-direction:column; height:100dvh; }

  header {
    background:#1e1e1e; border-bottom:2px solid #F5C842;
    padding:8px 12px; display:flex; align-items:center;
    justify-content:space-between; flex-shrink:0; z-index:1000;
  }
  .logo { font-size:14px; font-weight:900; color:#F5C842; letter-spacing:1px; text-transform:uppercase; }
  .logo em { color:#E8762B; font-style:normal; }
  .gps-pill {
    display:flex; align-items:center; gap:6px; background:#2a2a2a;
    border-radius:20px; padding:4px 10px; font-size:11px; color:#999;
    text-transform:uppercase;
  }
  .dot { width:8px; height:8px; border-radius:50%; background:#444; }
  .dot.seek { background:#F5C842; animation:blink 1s infinite; }
  .dot.ok { background:#4CAF50; }
  .dot.err { background:#D63A2F; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  #map { flex:1; background:#222; }

  .bar {
    background:#181818; border-top:1px solid #2a2a2a;
    padding:8px 12px; display:flex; justify-content:space-between;
    align-items:center; flex-shrink:0; z-index:1000;
  }
  .coords { color:#666; font-family:monospace; font-size:10px; }
  .campinfo { color:#F5C842; font-weight:700; font-size:13px; }

  .btn-stack {
    position:absolute; right:10px; bottom:90px; z-index:900;
    display:flex; flex-direction:column; gap:10px;
  }
  .fab {
    width:50px; height:50px; border-radius:50%; border:none;
    font-size:22px; cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center;
  }
  .fab-locate { background:#F5C842; color:#141414; }
  .fab-camp   { background:#E8762B; color:#fff; }
  .fab-layers { background:#2a2a2a; color:#F5C842; font-size:18px; }

  #prompt {
    position:fixed; inset:0; background:rgba(0,0,0,.92);
    display:flex; align-items:center; justify-content:center;
    z-index:9999; padding:24px;
  }
  .card {
    background:#1e1e1e; border:2px solid #F5C842; border-radius:14px;
    padding:30px 24px; max-width:300px; width:100%; text-align:center;
  }
  .card .big { font-size:36px; margin-bottom:8px; }
  .card h2 { font-size:18px; color:#F5C842; font-weight:900;
    text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .card p { font-size:13px; color:#999; line-height:1.6; margin-bottom:22px; }
  .btn-yes {
    display:block; width:100%; padding:15px 0; border:none; border-radius:9px;
    background:#F5C842; color:#141414; font-size:16px; font-weight:900;
    text-transform:uppercase; letter-spacing:1px; cursor:pointer;
  }

  /* Leaflet popup dark theme */
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background:#1e1e1e; color:#eee;
  }
  .stage-label {
    background:rgba(20,20,20,.8); border:1px solid #F5C842;
    border-radius:4px; color:#F5C842; font-weight:bold;
    font-size:10px; padding:2px 5px; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="app">
  <div id="prompt">
    <div class="card">
      <div class="big">🎪</div>
      <h2>Roo '26 — Where Am I?</h2>
      <p>Allow location access to see your live position on satellite imagery of the farm, and save your camp spot.</p>
      <button class="btn-yes" id="btnGPS">📍 Start Tracking</button>
    </div>
  </div>

  <header>
    <div class="logo">Bonnaroo <em>'26</em></div>
    <div class="gps-pill"><div class="dot" id="dot"></div><span id="glbl">Off</span></div>
  </header>

  <div id="map"></div>

  <div class="btn-stack">
    <button class="fab fab-layers" id="btnLayer" title="Toggle satellite/street">🗺</button>
    <button class="fab fab-camp" id="btnCamp" title="Save camp here">⛺</button>
    <button class="fab fab-locate" id="btnLoc" title="Center on me">◎</button>
  </div>

  <div class="bar">
    <span class="coords" id="crd">—</span>
    <span class="campinfo" id="ci"></span>
  </div>
</div>

<script>
// ── Map init: centered on the Farm ──────────────────────────
const FARM = [35.4846, -86.0853];

const sat = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, attribution: 'Esri World Imagery' }
);
const street = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 19, attribution: 'OpenStreetMap' }
);

const map = L.map('map', {
  center: FARM, zoom: 15,
  layers: [sat],
  zoomControl: false
});
L.control.zoom({ position: 'topleft' }).addTo(map);

let satOn = true;
document.getElementById('btnLayer').onclick = () => {
  if (satOn) { map.removeLayer(sat); map.addLayer(street); }
  else { map.removeLayer(street); map.addLayer(sat); }
  satOn = !satOn;
};

// ── Approximate stage labels (tap to identify; positions approximate) ──
const POIS = [
  ["What Stage",   35.4871, -86.0866],
  ["Which Stage",  35.4860, -86.0902],
  ["This Tent",    35.4840, -86.0902],
  ["That Tent",    35.4829, -86.0859],
  ["The Other",    35.4835, -86.0878],
  ["Where Stage",  35.4847, -86.0864],
  ["The Arch",     35.4827, -86.0885],
];
POIS.forEach(([name, la, lo]) => {
  L.marker([la, lo], {
    icon: L.divIcon({ className:'', html:`<div class="stage-label">${name}</div>`, iconAnchor:[30,8] })
  }).addTo(map);
});

// ── GPS tracking ─────────────────────────────────────────────
let youMarker = null, accCircle = null;
let curLat = null, curLon = null;
let followMe = true;

const youIcon = L.divIcon({
  className:'',
  html:'<div style="width:18px;height:18px;background:#3B8EF5;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(59,142,245,.35)"></div>',
  iconAnchor:[9,9]
});

function setDot(c, t) {
  document.getElementById('dot').className = 'dot ' + c;
  document.getElementById('glbl').textContent = t;
}

document.getElementById('btnGPS').onclick = () => {
  document.getElementById('prompt').style.display = 'none';
  if (!navigator.geolocation) { setDot('err','No GPS'); return; }
  setDot('seek','Searching…');
  navigator.geolocation.watchPosition(onPos, onErr,
    { enableHighAccuracy:true, timeout:20000, maximumAge:3000 });
};

function onPos(p) {
  curLat = p.coords.latitude;
  curLon = p.coords.longitude;
  const acc = p.coords.accuracy;
  setDot('ok', '±' + Math.round(acc) + 'm');

  if (!youMarker) {
    youMarker = L.marker([curLat,curLon], { icon: youIcon, zIndexOffset: 1000 }).addTo(map);
    accCircle = L.circle([curLat,curLon], { radius: acc, color:'#3B8EF5', weight:1, fillOpacity:.08 }).addTo(map);
    map.setView([curLat,curLon], 17);
  } else {
    youMarker.setLatLng([curLat,curLon]);
    accCircle.setLatLng([curLat,curLon]).setRadius(acc);
    if (followMe) map.panTo([curLat,curLon]);
  }

  document.getElementById('crd').textContent = curLat.toFixed(5)+', '+curLon.toFixed(5);
  updateCampInfo();
}
function onErr(e) { setDot('err', e.code===1 ? 'Denied' : 'No Signal'); }

// stop auto-follow when user drags the map; ◎ resumes it
map.on('dragstart', () => { followMe = false; });
document.getElementById('btnLoc').onclick = () => {
  followMe = true;
  if (curLat != null) map.setView([curLat,curLon], Math.max(map.getZoom(), 17));
};

// ── Camp save (localStorage) ─────────────────────────────────
let campMarker = null, campLine = null;
let camp = null;
try { camp = JSON.parse(localStorage.getItem('roo26_camp')); } catch(e){}

const campIcon = L.divIcon({
  className:'', html:'<div style="font-size:28px;filter:drop-shadow(0 1px 3px #000)">⛺</div>',
  iconAnchor:[14,26]
});

function drawCamp() {
  if (!camp) return;
  if (campMarker) { campMarker.setLatLng([camp.lat, camp.lon]); }
  else {
    campMarker = L.marker([camp.lat, camp.lon], { icon: campIcon, zIndexOffset: 900 })
      .addTo(map)
      .bindPopup('⛺ Your camp');
  }
  updateCampInfo();
}
drawCamp();

document.getElementById('btnCamp').onclick = () => {
  if (curLat == null) { alert('Waiting for GPS fix — give it a few seconds.'); return; }
  if (camp && !confirm('Replace saved camp with your current spot?')) return;
  camp = { lat: curLat, lon: curLon };
  try { localStorage.setItem('roo26_camp', JSON.stringify(camp)); } catch(e){}
  drawCamp();
  campMarker.openPopup();
};

function bearingTxt(lat1,lon1,lat2,lon2){
  const toR=d=>d*Math.PI/180;
  const y=Math.sin(toR(lon2-lon1))*Math.cos(toR(lat2));
  const x=Math.cos(toR(lat1))*Math.sin(toR(lat2))-Math.sin(toR(lat1))*Math.cos(toR(lat2))*Math.cos(toR(lon2-lon1));
  const brg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(brg/45)%8];
}

function updateCampInfo() {
  const el = document.getElementById('ci');
  if (!camp || curLat == null) { el.textContent = camp ? '⛺ saved' : ''; return; }
  const d = Math.round(map.distance([curLat,curLon],[camp.lat,camp.lon]));
  const dir = bearingTxt(curLat, curLon, camp.lat, camp.lon);
  el.textContent = '⛺ ' + (d<1000 ? d+'m' : (d/1000).toFixed(2)+'km') + ' ' + dir;

  // line from you to camp
  if (campLine) campLine.setLatLngs([[curLat,curLon],[camp.lat,camp.lon]]);
  else campLine = L.polyline([[curLat,curLon],[camp.lat,camp.lon]],
    { color:'#E8762B', weight:2, dashArray:'6 8', opacity:.8 }).addTo(map);
}
</script>
</body>
</html>
